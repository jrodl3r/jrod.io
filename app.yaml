runtime: php55
api_version: 1

handlers:
- url: /
  script: index.php

- url: /php/(.+\.php)
  script: php/\1

- url: /resume
  script: resume/index.php

- url: /resume/.*
  script: resume/index.php

- url: /timeline
  script: timeline/index.php

- url: /timeline/.*
  script: timeline/index.php

- url: /css
  static_dir: css

- url: /js
  static_dir: js

- url: /(.+\.(gif|png|jpg|ico|pdf))$
  static_files: \1
  upload: .+\.(gif|png|jpg|ico|pdf)$
  application_readable: true

- url: /robots.txt
  static_files: robots.txt
  upload: robots.txt
